:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --border: #2a2a3e;
  --accent: #ffe600;
  --accent2: #00d4ff;
  --accent3: #ff4466;
  --green: #00ff88;
  --purple: #b44fff;
  --orange: #ff8c00;
  --text: #e8e8f0;
  --text2: #6666aa;
  --radius: 12px;
  --pixel: 'Press Start 2P', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Helvetica Neue', sans-serif; min-height: 100vh; overflow-x: hidden; }

/* PIXEL FONT */
.pixel { font-family: var(--pixel); }


/* MOBILE FIXES */
* { -webkit-font-smoothing: antialiased; }
body { -webkit-text-size-adjust: 100%; }
@keyframes glow-pulse { from { filter: drop-shadow(0 0 8px var(--accent)); } to { filter: drop-shadow(0 0 20px var(--accent)); } }
@keyframes bounce { from { -webkit-transform: translateY(0); transform: translateY(0); } to { -webkit-transform: translateY(-10px); transform: translateY(-10px); } }
@keyframes pr-shake { 0%,100%{ -webkit-transform:rotate(0); transform:rotate(0); } 25%{ -webkit-transform:rotate(-8deg); transform:rotate(-8deg); } 75%{ -webkit-transform:rotate(8deg); transform:rotate(8deg); } }
@keyframes pulse-border { 0%,100%{ box-shadow:0 0 6px rgba(255,230,0,0.3); } 50%{ box-shadow:0 0 16px rgba(255,230,0,0.6); } }
.levelup-glow { -webkit-animation: glow-pulse 1s infinite alternate; animation: glow-pulse 1s infinite alternate; }
.complete-mascot { -webkit-animation: bounce 0.6s ease infinite alternate; animation: bounce 0.6s ease infinite alternate; }
.pr-emoji { -webkit-animation: pr-shake 0.5s ease-in-out; animation: pr-shake 0.5s ease-in-out; }
.map-week.current { -webkit-animation: pulse-border 1.5s ease-in-out infinite; animation: pulse-border 1.5s ease-in-out infinite; }
input, textarea, select { font-size: 16px !important; }
/* SCANLINE OVERLAY */
body::before { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px); pointer-events: none; z-index: 9999; }

/* NAV */
.nav { display: flex; background: var(--surface); border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 100; }
.nav-btn { flex: 1; padding: 12px 2px 10px; text-align: center; font-size: 9px; color: var(--text2); border: none; background: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; font-family: var(--pixel); transition: color 0.2s; }
.nav-btn .icon { font-size: 18px; }
.nav-btn.active { color: var(--accent); text-shadow: 0 0 8px var(--accent); }

/* PAGES */
.page { display: none; padding: 16px; max-width: 480px; margin: 0 auto; padding-bottom: 40px; }
.page.active { display: block; }

/* ===================== HUD BAR ===================== */
.hud { background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 16px; position: relative; overflow: hidden; }
.hud::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,230,0,0.03) 0%, transparent 60%); pointer-events: none; }
.hud-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.mascot { font-size: 36px; transition: all 0.3s; filter: drop-shadow(0 0 8px rgba(255,230,0,0.4)); }
.hud-info { flex: 1; }
.hud-name { font-family: var(--pixel); font-size: 10px; color: var(--accent); margin-bottom: 4px; }
.hud-level { font-family: var(--pixel); font-size: 8px; color: var(--text2); }
.hud-streak { display: flex; align-items: center; gap: 4px; font-family: var(--pixel); font-size: 9px; color: var(--orange); }
.hud-xp-row { margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
.hud-xp-label { font-family: var(--pixel); font-size: 8px; color: var(--text2); }
.hud-xp-val { font-family: var(--pixel); font-size: 8px; color: var(--accent); }
.xp-bar-wrap { background: #1a1a2e; border: 1px solid var(--border); border-radius: 4px; height: 10px; overflow: hidden; }
.xp-bar { height: 100%; background: linear-gradient(90deg, var(--accent), #ffaa00); border-radius: 4px; transition: width 0.8s cubic-bezier(0.34,1.56,0.64,1); position: relative; }
.xp-bar::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: rgba(255,255,255,0.3); border-radius: 4px; }

/* ===================== TODAY CARD ===================== */
.today-card { border-radius: var(--radius); padding: 16px; margin-bottom: 16px; border: 2px solid; position: relative; overflow: hidden; }
.today-card.push { border-color: var(--orange); background: linear-gradient(135deg, rgba(255,140,0,0.1), transparent); }
.today-card.pull { border-color: var(--accent2); background: linear-gradient(135deg, rgba(0,212,255,0.1), transparent); }
.today-card.legs { border-color: var(--purple); background: linear-gradient(135deg, rgba(180,79,255,0.1), transparent); }
.today-card.rest { border-color: var(--text2); background: linear-gradient(135deg, rgba(102,102,170,0.1), transparent); }
.today-card.deload { border-color: var(--accent); background: linear-gradient(135deg, rgba(255,230,0,0.1), transparent); }
.today-card-label { font-family: var(--pixel); font-size: 8px; color: var(--text2); margin-bottom: 6px; }
.today-card-title { font-family: var(--pixel); font-size: 13px; margin-bottom: 8px; line-height: 1.6; }
.today-card-sub { font-size: 12px; color: var(--text2); }
.today-card-week { font-family: var(--pixel); font-size: 7px; color: var(--text2); margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }

/* ===================== DAY TABS ===================== */
.day-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
.day-tab { flex: 1; padding: 10px 4px; text-align: center; border-radius: var(--radius); border: 2px solid var(--border); background: var(--surface); color: var(--text2); font-family: var(--pixel); font-size: 8px; cursor: pointer; transition: all 0.2s; line-height: 1.8; }
.day-tab[data-day="1"].active { border-color: var(--orange); color: var(--orange); box-shadow: 0 0 12px rgba(255,140,0,0.3); }
.day-tab[data-day="2"].active { border-color: var(--accent2); color: var(--accent2); box-shadow: 0 0 12px rgba(0,212,255,0.3); }
.day-tab[data-day="3"].active { border-color: var(--purple); color: var(--purple); box-shadow: 0 0 12px rgba(180,79,255,0.3); }

/* ===================== EXERCISE BLOCK ===================== */
.exercise-block { background: var(--surface); border-radius: var(--radius); margin-bottom: 14px; overflow: hidden; border: 2px solid var(--border); }
.exercise-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border-bottom: 1px solid var(--border); background: var(--surface2); }
.exercise-name { font-family: var(--pixel); font-size: 9px; color: var(--accent2); }
.exercise-xp-hint { font-family: var(--pixel); font-size: 7px; color: var(--text2); }
.add-set-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text2); border-radius: 8px; padding: 5px 10px; font-size: 11px; cursor: pointer; }

.col-headers { display: grid; grid-template-columns: 28px 1fr 1fr 1fr 28px; gap: 6px; padding: 6px 10px 2px; }
.col-headers span { font-family: var(--pixel); font-size: 7px; color: var(--text2); text-align: center; }

.set-row { display: grid; grid-template-columns: 28px 1fr 1fr 1fr 28px; gap: 6px; align-items: center; padding: 8px 10px; border-bottom: 1px solid var(--border); transition: background 0.2s; }
.set-row:last-child { border-bottom: none; }
.set-row.completed-set { background: rgba(0,255,136,0.05); }
.set-num { font-family: var(--pixel); font-size: 9px; color: var(--text2); text-align: center; }
.set-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 9px 6px; font-size: 15px; text-align: center; width: 100%; -moz-appearance: textfield; transition: border-color 0.2s; }
.set-input::-webkit-outer-spin-button, .set-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.set-input:focus { outline: none; border-color: var(--accent2); box-shadow: 0 0 8px rgba(0,212,255,0.2); }
.set-input.rpe-high { border-color: var(--accent3); }
.set-input.rpe-ok { border-color: var(--green); }
.delete-set-btn { background: none; border: none; color: #444; font-size: 15px; cursor: pointer; text-align: center; padding: 4px; }

.prev-hint { font-size: 11px; color: var(--text2); padding: 6px 14px 4px; }
.prev-hint strong { color: var(--accent2); }
.pr-hint { font-size: 11px; color: var(--accent); padding: 0 14px 8px; font-weight: 700; }

/* ===================== COMPLETE BTN ===================== */
.complete-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, var(--accent), #ffaa00); color: #000; font-family: var(--pixel); font-size: 11px; border: none; border-radius: var(--radius); cursor: pointer; margin-top: 12px; position: relative; overflow: hidden; box-shadow: 0 4px 20px rgba(255,230,0,0.3); transition: transform 0.1s, box-shadow 0.2s; }
.complete-btn:active { transform: scale(0.98); }
.complete-btn::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.2) 50%, transparent 70%); transform: translateX(-100%) rotate(45deg); transition: transform 0.6s; }
.complete-btn:hover::before { transform: translateX(100%) rotate(45deg); }

.notes-area { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 12px; font-size: 14px; resize: none; min-height: 70px; margin-top: 4px; }
.notes-area:focus { outline: none; border-color: var(--accent2); }
.section-label { font-family: var(--pixel); font-size: 8px; color: var(--text2); margin-bottom: 8px; margin-top: 16px; }

/* ===================== XP POPUP ===================== */
.xp-popup { position: fixed; pointer-events: none; font-family: var(--pixel); font-size: 14px; color: var(--accent); text-shadow: 0 0 10px var(--accent); z-index: 500; font-weight: 700; opacity: 0; transition: none; }
.xp-popup.pr { color: var(--accent3); font-size: 16px; }

/* ===================== LEVEL UP OVERLAY ===================== */
.levelup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 600; display: none; align-items: center; justify-content: center; flex-direction: column; }
.levelup-overlay.show { display: flex; }
.levelup-box { text-align: center; padding: 40px 30px; }
.levelup-glow { font-size: 80px; margin-bottom: 20px; animation: glow-pulse 1s infinite alternate; }
.levelup-title { font-family: var(--pixel); font-size: 16px; color: var(--accent); margin-bottom: 12px; text-shadow: 0 0 20px var(--accent); line-height: 1.8; }
.levelup-sub { font-family: var(--pixel); font-size: 10px; color: var(--text2); margin-bottom: 30px; line-height: 2; }
.levelup-btn { background: var(--accent); color: #000; font-family: var(--pixel); font-size: 10px; padding: 16px 32px; border: none; border-radius: var(--radius); cursor: pointer; }
@keyframes glow-pulse { from { filter: drop-shadow(0 0 10px var(--accent)); } to { filter: drop-shadow(0 0 30px var(--accent)) drop-shadow(0 0 60px var(--accent)); } }

/* ===================== PR OVERLAY ===================== */
.pr-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 600; display: none; align-items: center; justify-content: center; flex-direction: column; }
.pr-overlay.show { display: flex; }
.pr-box { text-align: center; padding: 32px 24px; max-width: 340px; }
.pr-emoji { font-size: 70px; margin-bottom: 16px; animation: pr-shake 0.5s ease-in-out; }
@keyframes pr-shake { 0%,100%{transform:rotate(0)} 20%{transform:rotate(-10deg)} 40%{transform:rotate(10deg)} 60%{transform:rotate(-8deg)} 80%{transform:rotate(8deg)} }
.pr-title { font-family: var(--pixel); font-size: 14px; color: var(--accent3); margin-bottom: 8px; text-shadow: 0 0 20px var(--accent3); line-height: 1.8; }
.pr-detail { font-family: var(--pixel); font-size: 9px; color: var(--text2); margin-bottom: 20px; line-height: 2; }
.pr-suggest { background: var(--surface2); border: 1px solid var(--accent); border-radius: var(--radius); padding: 14px; margin-bottom: 20px; font-family: var(--pixel); font-size: 9px; color: var(--accent); line-height: 2; }
.pr-btns { display: flex; gap: 10px; }
.pr-btn { flex: 1; padding: 14px; border-radius: var(--radius); border: none; font-family: var(--pixel); font-size: 8px; cursor: pointer; }
.pr-btn.apply { background: var(--accent); color: #000; }
.pr-btn.skip { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }

/* ===================== COMPLETE OVERLAY ===================== */
.complete-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 600; display: none; align-items: center; justify-content: center; flex-direction: column; }
.complete-overlay.show { display: flex; }
.complete-box { text-align: center; padding: 32px 24px; max-width: 360px; width: 100%; }
.complete-mascot { font-size: 80px; margin-bottom: 12px; animation: bounce 0.6s ease infinite alternate; }
@keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-12px)} }
.complete-title { font-family: var(--pixel); font-size: 13px; color: var(--green); margin-bottom: 6px; text-shadow: 0 0 15px var(--green); line-height: 1.8; }
.complete-xp { font-family: var(--pixel); font-size: 20px; color: var(--accent); margin: 12px 0; text-shadow: 0 0 20px var(--accent); }
.complete-stats { display: flex; gap: 10px; margin: 16px 0; }
.complete-stat { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 8px; }
.complete-stat-val { font-family: var(--pixel); font-size: 14px; color: var(--accent2); display: block; margin-bottom: 4px; }
.complete-stat-label { font-family: var(--pixel); font-size: 7px; color: var(--text2); }
.complete-btn-close { width: 100%; padding: 16px; background: var(--green); color: #000; font-family: var(--pixel); font-size: 10px; border: none; border-radius: var(--radius); cursor: pointer; margin-top: 8px; }
.streak-banner { background: linear-gradient(135deg, rgba(255,140,0,0.2), rgba(255,230,0,0.2)); border: 2px solid var(--orange); border-radius: var(--radius); padding: 12px; margin: 12px 0; font-family: var(--pixel); font-size: 9px; color: var(--orange); text-align: center; line-height: 2; }

/* ===================== HISTORY PAGE ===================== */
.history-filter { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-btn { padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); font-family: var(--pixel); font-size: 7px; cursor: pointer; }
.filter-btn.active { border-color: var(--accent); color: var(--accent); }
.history-card { background: var(--surface); border-radius: var(--radius); margin-bottom: 12px; border: 2px solid var(--border); overflow: hidden; }
.history-card-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; background: var(--surface2); }
.history-date { font-family: var(--pixel); font-size: 8px; }
.history-xp { font-family: var(--pixel); font-size: 8px; color: var(--accent); }
.history-badge { font-family: var(--pixel); font-size: 7px; padding: 3px 8px; border-radius: 20px; }
.badge-push { background: rgba(255,140,0,0.2); color: var(--orange); }
.badge-pull { background: rgba(0,212,255,0.2); color: var(--accent2); }
.badge-legs { background: rgba(180,79,255,0.2); color: var(--purple); }
.history-exercise { padding: 8px 14px; border-top: 1px solid var(--border); }
.history-exercise-name { font-family: var(--pixel); font-size: 8px; color: var(--accent2); margin-bottom: 6px; }
.history-sets { display: flex; flex-wrap: wrap; gap: 5px; }
.history-set-chip { background: var(--surface2); border-radius: 6px; padding: 3px 8px; font-size: 11px; color: var(--text2); }
.history-set-chip.pr-chip { border: 1px solid var(--accent3); color: var(--accent3); }
.delete-btn { background: none; border: none; color: #444; font-size: 16px; cursor: pointer; padding: 4px; }
.empty-state { text-align: center; color: var(--text2); padding: 60px 20px; }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-family: var(--pixel); font-size: 9px; line-height: 2; }

/* ===================== ACHIEVEMENTS PAGE ===================== */
.achievements-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.achievement-card { background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius); padding: 14px 12px; text-align: center; transition: all 0.3s; }
.achievement-card.unlocked { border-color: var(--accent); background: rgba(255,230,0,0.05); box-shadow: 0 0 12px rgba(255,230,0,0.15); }
.achievement-card.locked { opacity: 0.4; filter: grayscale(1); }
.achievement-icon { font-size: 32px; margin-bottom: 8px; }
.achievement-name { font-family: var(--pixel); font-size: 7px; color: var(--accent); margin-bottom: 4px; line-height: 1.6; }
.achievement-desc { font-size: 10px; color: var(--text2); line-height: 1.4; }
.achievement-date { font-family: var(--pixel); font-size: 6px; color: var(--text2); margin-top: 6px; }

/* ===================== MAP PAGE ===================== */
.map-wrap { padding: 8px 0; }
.map-phase { margin-bottom: 20px; }
.map-phase-title { font-family: var(--pixel); font-size: 8px; color: var(--text2); margin-bottom: 10px; padding-left: 8px; border-left: 3px solid var(--border); }
.map-weeks { display: flex; flex-wrap: wrap; gap: 8px; }
.map-week { width: 52px; height: 52px; border-radius: 10px; border: 2px solid var(--border); background: var(--surface); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; position: relative; }
.map-week .wnum { font-family: var(--pixel); font-size: 7px; color: var(--text2); }
.map-week .wicon { font-size: 18px; }
.map-week.completed { border-color: var(--green); background: rgba(0,255,136,0.08); }
.map-week.completed .wnum { color: var(--green); }
.map-week.current { border-color: var(--accent); background: rgba(255,230,0,0.1); box-shadow: 0 0 12px rgba(255,230,0,0.3); animation: pulse-border 1.5s ease-in-out infinite; }
.map-week.current .wnum { color: var(--accent); }
.map-week.deload-week { border-color: var(--accent); }
.map-week.deload-week .wicon::after { content: '⚡'; position: absolute; top: -4px; right: -4px; font-size: 10px; }
.map-week.locked { opacity: 0.3; }
@keyframes pulse-border { 0%,100%{box-shadow:0 0 8px rgba(255,230,0,0.3)} 50%{box-shadow:0 0 20px rgba(255,230,0,0.6)} }

/* ===================== WEEK DETAIL MODAL ===================== */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: flex-end; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; padding: 24px 20px 40px; border-top: 2px solid var(--border); max-height: 80vh; overflow-y: auto; }
.modal-title { font-family: var(--pixel); font-size: 10px; color: var(--accent); margin-bottom: 16px; }
.modal-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); padding: 12px 14px; font-size: 16px; margin-bottom: 12px; }
.modal-input:focus { outline: none; border-color: var(--accent2); }
.modal-actions { display: flex; gap: 10px; margin-top: 8px; }
.modal-btn { flex: 1; padding: 14px; border-radius: var(--radius); border: none; font-family: var(--pixel); font-size: 8px; cursor: pointer; }
.modal-btn.confirm { background: var(--accent); color: #000; }
.modal-btn.cancel { background: var(--surface2); color: var(--text2); }

.week-detail-content { font-size: 13px; color: var(--text2); line-height: 1.8; }
.week-detail-content strong { color: var(--text); }
.week-detail-schedule { display: flex; gap: 4px; margin: 12px 0; flex-wrap: wrap; }
.wds-chip { font-family: var(--pixel); font-size: 7px; padding: 5px 8px; border-radius: 6px; }
.wds-push { background: rgba(255,140,0,0.2); color: var(--orange); }
.wds-pull { background: rgba(0,212,255,0.2); color: var(--accent2); }
.wds-legs { background: rgba(180,79,255,0.2); color: var(--purple); }
.wds-rest { background: rgba(102,102,170,0.15); color: var(--text2); }
.wds-deload { background: rgba(255,230,0,0.15); color: var(--accent); }

/* ===================== SETUP ===================== */
.setup-box { background: var(--surface); border: 2px solid var(--accent); border-radius: var(--radius); padding: 24px 20px; text-align: center; }
.setup-mascot { font-size: 60px; margin-bottom: 16px; }
.setup-title { font-family: var(--pixel); font-size: 12px; color: var(--accent); margin-bottom: 8px; line-height: 1.8; }
.setup-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; line-height: 1.6; }
.setup-label { font-family: var(--pixel); font-size: 8px; color: var(--text2); margin-bottom: 8px; text-align: left; }
.setup-input { width: 100%; background: var(--surface2); border: 2px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 12px 14px; font-size: 16px; margin-bottom: 16px; }
.setup-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--accent), #ffaa00); color: #000; font-family: var(--pixel); font-size: 10px; border: none; border-radius: var(--radius); cursor: pointer; }

/* ===================== TOAST ===================== */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--surface); border: 2px solid var(--accent); color: var(--accent); padding: 12px 20px; border-radius: 30px; font-family: var(--pixel); font-size: 9px; z-index: 999; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); pointer-events: none; white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }

/* ===================== STATS (simple) ===================== */
.stats-select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 10px 14px; font-size: 14px; margin-bottom: 16px; }
.stat-card { background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
.stat-card-title { font-family: var(--pixel); font-size: 8px; color: var(--text2); margin-bottom: 8px; }
.stat-big { font-family: var(--pixel); font-size: 24px; color: var(--accent); }
.stat-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }
.stat-row { display: flex; gap: 10px; margin-bottom: 10px; }
.stat-row .stat-card { flex: 1; margin-bottom: 0; }
.chart-bars { display: flex; align-items: flex-end; gap: 4px; height: 70px; margin-top: 8px; }
.chart-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
.chart-bar { width: 100%; background: linear-gradient(180deg, var(--accent), #ffaa00); border-radius: 3px 3px 0 0; min-height: 2px; }
.chart-bar.pr-bar { background: linear-gradient(180deg, var(--accent3), #ff8866); }
.chart-bar-label { font-family: var(--pixel); font-size: 6px; color: var(--text2); }
.chart-bar-val { font-family: var(--pixel); font-size: 7px; color: var(--accent); }
</style>
</head>

</div>

// ============================================================
// GAME CALCULATIONS
// ============================================================
function calc1RM(w, r) { return w * (1 + r / 30); }

function getLevelTitle(level) {
  const idx = Math.min(level - 1, LEVEL_TITLES.length - 1);
  return LEVEL_TITLES[idx];
}

function getMascotState(state) {
  if (!state.lastTrainDate) return { emoji: '😴', msg: '在等你…' };
  const today = todayStr();
  const last = state.lastTrainDate;
  if (last === today) return { emoji: '🔥', msg: '今日已完成！' };
  if (state.streak >= 7) return { emoji: '👑', msg: `${state.streak}天連勝！` };
  if (state.streak >= 3) return { emoji: '💪', msg: `連續 ${state.streak} 天！` };
  return { emoji: '😤', msg: '準備好了嗎？' };
}

function todayStr() {
  return new Date().toISOString().split('T')[0];
}

function updateStreak(state) {
  const today = todayStr();
  if (state.lastTrainDate === today) return state; // already trained today
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
  const yStr = yesterday.toISOString().split('T')[0];
  if (state.lastTrainDate === yStr) {
    state.streak = (state.streak || 0) + 1;
  } else {
    state.streak = 1;
  }
  state.lastTrainDate = today;
  return state;
}

function getPhaseForWeek(w) { return YEAR_PLAN.find(p => p.weeks.includes(w)) || null; }

function getCurrentWeek() {
  const ps = getPlanStart();
  if (!ps) return null;
  const start = new Date(ps + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.floor((today - start) / 86400000);
  if (diff < 0 || diff >= 364) return null;
  return Math.floor(diff / 7) + 1;
}

function getTodaySchedule() {
  const ps = getPlanStart();
  if (!ps) return null;
  const start = new Date(ps + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.floor((today - start) / 86400000);
  if (diff < 0 || diff >= 364) return null;
  const weekNum = Math.floor(diff / 7) + 1;
  const dayOfCycle = diff % 7;
  return { weekNum, schedule: WEEK_CYCLE[dayOfCycle], phase: getPhaseForWeek(weekNum) };
}

function renderTodayBanner() {
  const info = getTodaySchedule();
  const el = document.getElementById('today-banner');
  if (!info) { el.innerHTML = ''; return; }
  const { weekNum, schedule, phase } = info;
  const isDeload = phase && phase.phase === 'deload';
  const colorClass = isDeload ? 'deload' : schedule.type;
  const icons = {push:'💪',pull:'🏋️',legs:'🦵',rest:'😴'};
  const icon = icons[schedule.type] || '📅';
  el.innerHTML = `<div class="today-card ${colorClass}">
    <div class="today-card-label">▶ 今日任務</div>
    <div class="today-card-title">${icon} ${isDeload?'⚡減量－':''}${schedule.label}</div>
    ${isDeload ? '<div class="today-card-sub" style="color:var(--accent)">重量降20%，每動作2組，充分恢復</div>' : ''}
    ${phase ? `<div class="today-card-week">WK${weekNum} ▪ ${phase.name} ▪ ${phase.sets} ▪ RPE ${phase.rpe}</div>` : ''}
  </div>`;
  if (schedule.type === 'push') selectDay(1, true);
  else if (schedule.type === 'pull') selectDay(2, true);
  else if (schedule.type === 'legs') selectDay(3, true);
}

function selectDay(day, silent) {
  currentDay = day;
  document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.day-tab[data-day="${day}"]`).classList.add('active');
  const t = getTemplates();
  currentExercises = JSON.parse(JSON.stringify(t[day]));
  renderExercises();
}

function getPrevSession(day) {
  const s = getSessions().filter(s => s.day == day);
  return s.length ? s[s.length-1] : null;
}

  const container = document.getElementById('exercises-container');

    const currentPR = prs[ex.name] || null;

    let prevHint = '';
    if (prevEx) {
      const best = prevEx.sets.reduce((a,b) => (calc1RM(+a.w||0,+a.r||0) >= calc1RM(+b.w||0,+b.r||0) ? a : b), prevEx.sets[0]);
      const date = new Date(prev.date+'T00:00:00').toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'});
      prevHint = `<div class="prev-hint">上次 ${date}：最重 <strong>${best.w}kg×${best.r}下</strong></div>`;
    }
    let prHint = '';
    if (currentPR) {
      prHint = `<div class="pr-hint">🏆 PR：${currentPR.w}kg×${currentPR.r}下（1RM≈${currentPR.orm.toFixed(1)}）</div>`;

    const setsHtml = ex.sets.map((set, si) => `
      <div class="set-row" id="set-${ei}-${si}">
        <span class="set-num">${si+1}</span>
        <input class="set-input" type="number" inputmode="decimal" placeholder="kg" value="${set.w||''}" onchange="updateSet(${ei},${si},'w',this.value)">
        <input class="set-input" type="number" inputmode="numeric" placeholder="下" value="${set.r||''}" onchange="updateSet(${ei},${si},'r',this.value)">
        <input class="set-input rpe-input" type="number" inputmode="decimal" placeholder="RPE" min="1" max="10" step="0.5" value="${set.rpe||''}" onchange="updateSetRPE(${ei},${si},this)">
        <button class="delete-set-btn" onclick="deleteSet(${ei},${si})">✕</button>
      </div>`).join('');

    container.innerHTML += `<div class="exercise-block" id="ex-block-${ei}">
      <div class="exercise-header">
        <span class="exercise-name">${ex.name}</span>
        <span class="exercise-xp-hint">×${ex.sets.length}組 = ${ex.sets.length * XP_PER_SET}XP</span>
      </div>
      ${prevHint}${prHint}
      <div class="col-headers"><span></span><span>重量kg</span><span>次數</span><span>RPE</span><span></span></div>
      <div id="sets-${ei}">${setsHtml}</div>

// COMPLETE SESSION
// ============================================================
function collectInputs() {
  currentExercises.forEach((ex, ei) => {
    ex.sets.forEach((set, si) => {
      const row = document.getElementById(`set-${ei}-${si}`);
      if (!row) return;
      const inputs = row.querySelectorAll('.set-input');
      set.w = inputs[0].value === '' ? '' : +inputs[0].value;
      set.r = inputs[1].value === '' ? '' : +inputs[1].value;
      set.rpe = inputs[2].value === '' ? '' : +inputs[2].value;
    });
  });
}

function completeSession() {
  collectInputs();

  // Check if any sets have data
  const hasData = currentExercises.some(ex => ex.sets.some(s => s.w && s.r));
  if (!hasData) { showToast('請先填入訓練數據！'); return; }

  const date = todayStr();
  const notes = document.getElementById('session-notes').value;
  const info = getTodaySchedule();
  const isDeload = info && info.phase && info.phase.phase === 'deload';
  const weekNum = info ? info.weekNum : null;

  // Calculate XP
  let xpGained = XP_COMPLETE;
  let totalSets = 0;
  let totalVol = 0;

  currentExercises.forEach(ex => {
    ex.sets.forEach(set => {
      if (set.w && set.r) {
        xpGained += XP_PER_SET;
        const rpeBonus = set.rpe >= 9 ? 5 : 0;
        xpGained += rpeBonus;
        totalSets++;
        totalVol += (+set.w) * (+set.r);
      }
    });
  });
  if (isDeload) xpGained += XP_DELOAD;

  // Check PRs
  const prs = getPRs();
  pendingPRs = [];
  currentExercises.forEach(ex => {
    const validSets = ex.sets.filter(s => s.w && s.r);
    if (!validSets.length) return;
    const bestSet = validSets.reduce((a,b) => calc1RM(+a.w,+a.r) >= calc1RM(+b.w,+b.r) ? a : b);
    const bestORM = calc1RM(+bestSet.w, +bestSet.r);
    const existingPR = prs[ex.name];
    if (!existingPR || bestORM > existingPR.orm) {
      pendingPRs.push({ name: ex.name, w: bestSet.w, r: bestSet.r, orm: bestORM, prevORM: existingPR ? existingPR.orm : 0 });
      xpGained += XP_PR;
      prs[ex.name] = { w: bestSet.w, r: bestSet.r, orm: bestORM, date };
    }
  });
  savePRs(prs);

  // Update state
  let state = getState();
  const prevLevel = state.level;
  state = updateStreak(state);
  state.xp = (state.xp || 0) + xpGained;
  state.level = Math.floor(state.xp / XP_PER_LEVEL) + 1;
  state.totalSessions = (state.totalSessions || 0) + 1;
  state.totalPRs = (state.totalPRs || 0) + pendingPRs.length;
  state.totalSets = (state.totalSets || 0) + totalSets;
  saveState(state);

  // Save session
  const session = { id: Date.now(), date, day: currentDay, exercises: JSON.parse(JSON.stringify(currentExercises)), notes, xpGained, weekNum };
  const sessions = getSessions(); sessions.push(session); saveSessions(sessions);

  // Update template
  const t = getTemplates(); t[currentDay] = JSON.parse(JSON.stringify(currentExercises)); saveTemplates(t);

  // Check achievements
  checkAchievements(state, totalVol, weekNum, isDeload);

  // Show complete overlay
  showCompleteOverlay(xpGained, totalSets, totalVol, state);

  // Level up?
  if (state.level > prevLevel) {
    setTimeout(() => showLevelUp(state.level, getLevelTitle(state.level)), 2500);
  }

  // PR flow
  if (pendingPRs.length > 0) {
    setTimeout(() => showPROverlay(pendingPRs[0]), 3500);
  }

  renderHUD();
  document.getElementById('session-notes').value = '';
}

function checkAchievements(state, totalVol, weekNum, isDeload) {
  const unlocked = getAchievements();
  const sessions = getSessions();
  const newUnlocks = [];

  const check = (id, condition) => {
    if (!unlocked[id] && condition) { unlocked[id] = todayStr(); newUnlocks.push(id); }
  };

  check('first_session', state.totalSessions >= 1);
  check('streak_3',  (state.streak||0) >= 3);
  check('streak_7',  (state.streak||0) >= 7);
  check('streak_30', (state.streak||0) >= 30);
  check('streak_100',(state.streak||0) >= 100);
  check('level_5',   state.level >= 5);
  check('level_10',  state.level >= 10);
  check('level_20',  state.level >= 20);
  check('first_pr',  state.totalPRs >= 1);
  check('pr_10',     state.totalPRs >= 10);
  check('sessions_10',  state.totalSessions >= 10);
  check('sessions_50',  state.totalSessions >= 50);
  check('sessions_100', state.totalSessions >= 100);
  check('vol_1000', totalVol >= 1000);
  check('vol_5000', totalVol >= 5000);
  check('deload_done', isDeload);
  check('week_13', weekNum && weekNum >= 13);
  check('week_26', weekNum && weekNum >= 26);
  check('week_52', weekNum && weekNum >= 52);

  const pushC  = sessions.filter(s => s.day === 1).length;
  const pullC  = sessions.filter(s => s.day === 2).length;
  const legsC  = sessions.filter(s => s.day === 3).length;
  check('all_days', pushC >= 10 && pullC >= 10 && legsC >= 10);

  saveAchievements(unlocked);

  // Show new unlock toasts
  newUnlocks.forEach((id, i) => {
    const ach = ACHIEVEMENTS.find(a => a.id === id);
    if (ach) setTimeout(() => showToast(`${ach.icon} 成就解鎖：${ach.name}！`), i * 1500 + 1000);
  });
}

function renderAchievements() {
  const unlocked = getAchievements();
  const grid = document.getElementById('achievements-grid');
  const unlockedList = ACHIEVEMENTS.filter(a => unlocked[a.id]);
  const lockedList   = ACHIEVEMENTS.filter(a => !unlocked[a.id]);

  const makeCard = (a) => {
    const isUnlocked = !!unlocked[a.id];
    const dateStr = unlocked[a.id] ? new Date(unlocked[a.id]).toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'}) : '';
    return `<div class="achievement-card ${isUnlocked ? 'unlocked' : 'locked'}">
      <div class="achievement-icon">${a.icon}</div>
      <div class="achievement-name">${a.name}</div>
      <div class="achievement-desc">${a.desc}</div>
      ${isUnlocked ? `<div class="achievement-date">${dateStr} 解鎖</div>` : ''}
    </div>`;
  };

  grid.innerHTML = `
    <div style="grid-column:1/-1;font-family:var(--pixel);font-size:8px;color:var(--accent);margin-bottom:4px;">已解鎖 ${unlockedList.length} / ${ACHIEVEMENTS.length}</div>
    ${unlockedList.map(makeCard).join('')}

  grid.className = 'achievements-grid';
}

function populateStatsSelect() {
  const sessions = getSessions();
  const names = new Set();
  sessions.forEach(s => s.exercises.forEach(e => names.add(e.name)));
  const sel = document.getElementById('stats-select');
  const cur = sel.value;
  sel.innerHTML = names.size
    ? [...names].map(n => `<option value="${n}" ${n===cur?'selected':''}>${n}</option>`).join('')
    : '<option>無資料</option>';
}

function renderStats() {
  const name = document.getElementById('stats-select').value;
  const container = document.getElementById('stats-content');
  if (!name) { container.innerHTML = '<div class="empty-state"><p>先記錄訓練才能看統計！</p></div>'; return; }

  const history = [];
  const prs = getPRs();
  getSessions().forEach(s => {
    const ex = s.exercises.find(e => e.name === name);
    if (!ex) return;
    const valid = ex.sets.filter(s => s.w && s.r);
    if (!valid.length) return;
    const bestSet = valid.reduce((a,b) => calc1RM(+a.w,+a.r) >= calc1RM(+b.w,+b.r) ? a : b);
    const bestORM = calc1RM(+bestSet.w, +bestSet.r);
    const totalVol = valid.reduce((sum,s) => sum + (+s.w * +s.r), 0);
    history.push({ date: s.date, bestW: +bestSet.w, bestR: +bestSet.r, orm: bestORM, totalVol });
  });

  if (!history.length) { container.innerHTML = `<div class="empty-state"><p>找不到「${name}」的資料</p></div>`; return; }

  const latest = history[history.length-1];
  const pr = prs[name];
  const recent = history.slice(-8);
  const barMax = Math.max(...recent.map(h => h.orm));

  const barsHtml = recent.map(h => {
    const pct = barMax ? Math.round((h.orm / barMax) * 100) : 0;
    const isPR = pr && pr.date === h.date;
    const label = new Date(h.date+'T00:00:00').toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'});
    return `<div class="chart-bar-wrap">
      <div class="chart-bar-val">${h.bestW}</div>
      <div class="chart-bar ${isPR?'pr-bar':''}" style="height:${Math.max(pct*0.6,2)}px"></div>
      <div class="chart-bar-label">${label}</div>
    </div>`;
  }).join('');

  container.innerHTML = `
    <div class="stat-row">
      <div class="stat-card"><div class="stat-card-title">本次最重</div><div class="stat-big">${latest.bestW}<span style="font-size:12px"> kg</span></div><div class="stat-sub">${latest.bestR}下 · 1RM≈${latest.orm.toFixed(1)}</div></div>
      <div class="stat-card"><div class="stat-card-title">歷史PR</div><div class="stat-big" style="color:var(--accent3)">${pr ? pr.w : '-'}<span style="font-size:12px"> kg</span></div><div class="stat-sub">${pr ? `${pr.r}下 · 1RM≈${pr.orm.toFixed(1)}` : '尚無PR'}</div></div>
    </div>
    <div class="stat-card"><div class="stat-card-title">訓練次數</div><div class="stat-big" style="color:var(--accent2)">${history.length}<span style="font-size:14px"> 次</span></div></div>
    <div class="stat-card">
      <div class="stat-card-title">近期進步（估算1RM）${recent.some(h=>prs[name]&&prs[name].date===h.date)?'🏆':''}</div>
      <div class="chart-bars">${barsHtml}</div>
    </div>`;
}

// ============================================================
// NAVIGATION
// ============================================================
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  document.getElementById(`nav-${page}`).classList.add('active');
  if (page === 'history') renderHistory();
  if (page === 'achievements') renderAchievements();
  if (page === 'map') renderMap();
  if (page === 'stats') { populateStatsSelect(); renderStats(); }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ============================================================
// INIT
// ============================================================
renderHUD();
renderTodayBanner();
selectDay(1);
</script>
